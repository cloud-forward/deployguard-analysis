name: Build, Push, and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: deployguard-analysis
  K8S_NAMESPACE: deployguard
  DEPLOYMENT_NAME: deployguard-analysis
  CONTAINER_NAME: deployguard-analysis
  KUBECONFIG: /home/ubuntu/.kube/config

permissions:
  id-token: write
  contents: read

jobs:
  build-push-deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # AWS 인증 (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::189060532132:role/deployguard-analysis-github-role
          aws-region: ${{ env.AWS_REGION }}

      # ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Git SHA
      - name: Extract Git metadata
        id: meta
        run: echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      # Docker build
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG_SHA: ${{ steps.meta.outputs.sha_short }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_SHA \
            .

      # Docker push
      - name: Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG_SHA: ${{ steps.meta.outputs.sha_short }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_SHA

      # kubectl 설치
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      # kubeconfig 확인
      - name: Verify kubeconfig
        run: |
          echo "KUBECONFIG=$KUBECONFIG"
          ls -al $KUBECONFIG

      # 클러스터 연결 확인
      - name: Verify Kubernetes connection
        run: |
          kubectl get nodes

      # manifest 적용
      - name: Apply manifests
        run: |
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/

      # 이미지 업데이트
      - name: Update deployment image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG_SHA: ${{ steps.meta.outputs.sha_short }}
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_SHA \
            -n $K8S_NAMESPACE

      # rollout 대기
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/$DEPLOYMENT_NAME -n $K8S_NAMESPACE

      # 배포 확인
      - name: Verify deployment
        run: |
          kubectl get pods -n $K8S_NAMESPACE
          kubectl get deployment $DEPLOYMENT_NAME -n $K8S_NAMESPACE