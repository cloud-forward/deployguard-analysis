name: Deploy dg-analysis

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: deployguard-analysis
  CONTAINER_NAME: deployguard-analysis

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::189060532132:role/deployguard-analysis-github-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Git SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha_short }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy container
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # [ADDED] shell safety
          set -euo pipefail

          echo "Pull latest image"
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Stop old container"
          docker stop $CONTAINER_NAME || true

          echo "Remove old container"
          docker rm $CONTAINER_NAME || true

          # [ADDED] check whether port 8000 is still occupied
          echo "Check port 8000 usage before run"
          ss -tulpn | grep ':8000' || true

          # [ADDED] try to clean up orphan docker-proxy processes holding 8000
          PROXY_PIDS="$(ss -tulpn | awk '/:8000/ && /docker-proxy/ {
            if (match($0, /pid=([0-9]+)/, m)) print m[1]
          }' | sort -u || true)"

          if [ -n "${PROXY_PIDS}" ]; then
            echo "Found docker-proxy PIDs on port 8000: ${PROXY_PIDS}"
            kill ${PROXY_PIDS} || true
            sleep 2
          fi

          # [ADDED] fail fast if 8000 is still occupied
          if ss -tulpn | grep ':8000' > /dev/null; then
            echo "Port 8000 is still in use. Aborting deploy."
            ss -tulpn | grep ':8000' || true
            exit 1
          fi

          echo "Run new container"
          docker run -d \
            --restart unless-stopped \
            --name $CONTAINER_NAME \
            -p 8000:8000 \
            -e AWS_REGION=ap-northeast-2 \
            -e S3_BUCKET_NAME=dg-raw-scans \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Cleanup unused images"
          docker image prune -af