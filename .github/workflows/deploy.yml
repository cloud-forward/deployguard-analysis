name: Build, Push, and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: deployguard-analysis
  K8S_NAMESPACE: deployguard
  DEPLOYMENT_NAME: deployguard-analysis
  CONTAINER_NAME: deployguard-analysis
  KUBECONFIG: /home/ubuntu/.kube/config

permissions:
  id-token: write
  contents: read

jobs:
  build-push-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::189060532132:role/deployguard-analysis-github-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Git metadata
        id: meta
        run: echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG_SHA: ${{ steps.meta.outputs.sha_short }}
        run: |
          echo "ECR_REGISTRY=${ECR_REGISTRY}"
          IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          IMAGE_SHA="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"

          docker buildx build \
            -t "${IMAGE_LATEST}" \
            -t "${IMAGE_SHA}" \
            --push \
            .

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Verify kubeconfig
        run: |
          echo "KUBECONFIG=$KUBECONFIG"
          ls -al $KUBECONFIG

      - name: Verify Kubernetes connection
        run: kubectl get nodes

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Update deployment image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG_SHA: ${{ steps.meta.outputs.sha_short }}
        run: |
          kubectl set image deployment/${DEPLOYMENT_NAME} \
            ${CONTAINER_NAME}=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_SHA} \
            -n ${K8S_NAMESPACE}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${DEPLOYMENT_NAME} \
            -n ${K8S_NAMESPACE} \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n ${K8S_NAMESPACE}
          kubectl get deployment ${DEPLOYMENT_NAME} -n ${K8S_NAMESPACE}
          kubectl rollout history deployment/${DEPLOYMENT_NAME} -n ${K8S_NAMESPACE}